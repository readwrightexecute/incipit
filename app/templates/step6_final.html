{% extends "base.html" %}
{% block content %}
<script id="session-meta" type="application/json">{"id": "{{ s.id }}", "idea": {{ s.idea|tojson }}, "phase": "{{ s.phase }}"}</script>
<p class="step-label">Your Super-Prompt</p>
<div>
  <div class="action-bar">
    <button id="copy-btn" onclick="copyPrompt()" aria-live="polite">Copy to clipboard</button>
    <a href="/sessions/{{ s.id }}/download.md" role="button" class="secondary">Download .md</a>
    <a href="/" role="button" class="contrast outline">New session</a>
  </div>
  <div class="section-content" id="mega-prompt">{{ mega_prompt }}</div>
</div>
<script>
function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('mega-prompt').innerText)
    .then(() => flashCopyBtn('Copied ✓'))
    .catch(() => flashCopyBtn('Copy failed — select & copy manually'));
}
function flashCopyBtn(msg) {
  const b = document.getElementById('copy-btn');
  b.textContent = msg;
  setTimeout(() => b.textContent = 'Copy to clipboard', 1500);
}
</script>
{% endblock %}
