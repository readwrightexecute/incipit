{% extends "base.html" %}
{% block content %}
<p class="step-label">Step 5 of 5 — Your mega-prompt</p>
<div hx-ext="sse" sse-connect="/sessions/{{ s.id }}/events">
  <p>
    <button id="copy-btn" onclick="copyPrompt()">Copy to clipboard</button>
    <a href="/sessions/{{ s.id }}/download.md" role="button" class="secondary">Download .md</a>
    <a href="/" role="button" class="contrast outline">New session</a>
  </p>
  <div class="section-content" id="mega-prompt"
       hx-get="/sessions/{{ s.id }}/megaprompt"
       hx-trigger="sse:mega_updated" hx-swap="innerHTML">{{ mega_prompt }}</div>

  <p style="margin-top:1.2rem">
    <button class="contrast" hx-post="/sessions/{{ s.id }}/party"
            hx-target="#party-region" hx-swap="innerHTML"
            {% if s.party_status == 'running' %}disabled{% endif %}>
      🎉 Party mode — convene the BMAD round table
    </button>
  </p>
  <div id="party-region">
    {% if s.party_status != 'idle' %}{% include "partials/party_panel.html" %}{% endif %}
  </div>
</div>
<script>
function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('mega-prompt').innerText)
    .then(() => {
      const b = document.getElementById('copy-btn');
      b.textContent = 'Copied ✓';
      setTimeout(() => b.textContent = 'Copy to clipboard', 1500);
    });
}
</script>
{% endblock %}
