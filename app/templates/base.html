<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incipit</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
  <style>
    /* ---- Violet dark theme (overrides Pico's default azure) ---- */
    :root { --pico-border-radius: .5rem; }
    [data-theme="dark"] {
      --pico-background-color: #16161f;
      --pico-color: #c6cbe3;
      --pico-h1-color: #efedf7; --pico-h2-color: #e6e2f2; --pico-h3-color: #dcd7ec;
      --pico-muted-color: #7e86ac;
      --pico-muted-border-color: #2a2c3e;
      --pico-card-background-color: #1e1f2e;
      --pico-card-sectioning-background-color: #1e1f2e;
      --pico-card-border-color: #2a2c3e;
      --pico-form-element-background-color: #1a1b28;
      --pico-form-element-border-color: #313450;
      --pico-form-element-active-border-color: #bb9af7;
      --pico-form-element-focus-color: rgba(187, 154, 247, .35);
      --pico-primary: #bb9af7;
      --pico-primary-hover: #cdb6ff;
      --pico-primary-focus: rgba(187, 154, 247, .3);
      --pico-primary-background: #7c5cd6;
      --pico-primary-hover-background: #8d6ee6;
      --pico-primary-inverse: #ffffff;
      --pico-primary-underline: rgba(187, 154, 247, .4);
    }
    body { background:
      radial-gradient(1100px 500px at 80% -10%, rgba(124, 92, 214, .12), transparent 70%),
      var(--pico-background-color); }

    /* ---- App ---- */
    h1 { letter-spacing: -.02em; }
    .step-label { color: var(--pico-primary); font-size: .8rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; }
    .section-content { white-space: pre-wrap; font-family: var(--pico-font-family); background: var(--pico-card-background-color); padding: .75rem 1rem; border-radius: var(--pico-border-radius); border: 1px solid var(--pico-card-border-color); }
    .spinner { display: inline-block; width: 1em; height: 1em; border: 2px solid var(--pico-primary); border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -.15em; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .55; } }
    @keyframes bubble-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    #status-bar:empty { display: none; }
    #status-bar { padding: .55rem 1rem; border-radius: var(--pico-border-radius); background: var(--pico-card-background-color);
      border: 1px solid var(--pico-card-border-color); border-left: 3px solid var(--pico-primary); margin-bottom: 1rem; font-size: .9rem; }
    .refine-row { display: flex; gap: .5rem; margin-top: .5rem; }
    .refine-row select, .refine-row input { margin-bottom: 0; }
    .assumption { color: var(--pico-muted-color); font-size: .85rem; }
    textarea { min-height: 10rem; }
    .error { color: #f7768e; }
    article header h3 { margin-bottom: 0; }
    .refine-examples { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .4rem; }
    .ex-chip { font-size: .75rem; padding: .12rem .6rem; border: 1px solid var(--pico-muted-border-color);
      border-radius: 999px; text-decoration: none; color: var(--pico-muted-color); cursor: pointer; transition: all .12s; }
    .ex-chip:hover { border-color: var(--pico-primary); color: var(--pico-primary); background: rgba(187, 154, 247, .08); }
    /* Party mode group chat */
    .chat { display: flex; flex-direction: column; gap: .6rem; max-height: 60vh; overflow-y: auto;
      padding: .6rem; background: var(--pico-background-color); border: 1px solid var(--pico-card-border-color); border-radius: var(--pico-border-radius); }
    .bubble { padding: .5rem .8rem; border-radius: 10px; background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color); animation: bubble-in .25s ease-out; }
    .bubble.facilitator { border-left: 3px solid var(--pico-primary); }
    .bubble.system { background: transparent; border-style: dashed; font-size: .85rem; color: var(--pico-muted-color); text-align: center; }
    .bubble .who { font-weight: 600; font-size: .82rem; color: var(--pico-primary); }
    .bubble.facilitator .who { color: #e0af68; }
    .bubble .who small { font-weight: 400; color: var(--pico-muted-color); }
    .bubble .msg { white-space: pre-wrap; margin-top: .15rem; }
    .party-turn { font-size: .85rem; color: var(--pico-muted-color); min-height: 1.2em; }
    .party-turn:not(:empty) { animation: pulse 1.6s ease-in-out infinite; }
    .change-card { border-left: 3px solid var(--pico-muted-border-color); }
    .change-card.applied { border-left-color: #9ece6a; }
    .change-card.denied { opacity: .55; border-left-color: #f7768e; }
  </style>
</head>
<body>
<main class="container">
  <hgroup>
    <h1>Incipit</h1>
    <p><em>here begins</em> — idea → structured mega-prompt, BMAD-style, in minutes.</p>
  </hgroup>
  <p>
    <a href="#" role="button" class="secondary outline" style="width:auto;padding:.2rem .7rem;font-size:.8rem"
       hx-get="/settings" hx-target="#settings-region" hx-swap="innerHTML">⚙ Model settings</a>
  </p>
  <div id="settings-region"></div>
  <div id="wizard">
    {% block content %}{% endblock %}
  </div>
</main>
<script>
  // Keep the party-mode chat scrolled to the newest message after SSE swaps.
  document.body.addEventListener('htmx:afterSwap', function (e) {
    if (e.target && e.target.id === 'party-chat') {
      e.target.scrollTop = e.target.scrollHeight;
    }
  });
</script>
</body>
</html>
