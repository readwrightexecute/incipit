<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incipit</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <script src="/static/htmx.min.js"></script>
  <script src="/static/sse.js"></script>
  <style>
    .step-label { color: var(--pico-muted-color); font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; }
    .section-content { white-space: pre-wrap; font-family: var(--pico-font-family); background: var(--pico-card-background-color); padding: .75rem 1rem; border-radius: 8px; }
    .spinner { display: inline-block; width: 1em; height: 1em; border: 2px solid var(--pico-muted-color); border-top-color: transparent; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: -.15em; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #status-bar:empty { display: none; }
    #status-bar { padding: .5rem 1rem; border-radius: 8px; background: var(--pico-card-background-color); margin-bottom: 1rem; font-size: .9rem; }
    .refine-row { display: flex; gap: .5rem; margin-top: .5rem; }
    .refine-row select { margin-bottom: 0; }
    .assumption { color: var(--pico-muted-color); font-size: .85rem; }
    textarea { min-height: 10rem; }
    .error { color: #e53e3e; }
    article header h3 { margin-bottom: 0; }
    .refine-examples { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .4rem; }
    .ex-chip { font-size: .75rem; padding: .1rem .55rem; border: 1px solid var(--pico-muted-border-color);
      border-radius: 999px; text-decoration: none; color: var(--pico-muted-color); }
    .ex-chip:hover { border-color: var(--pico-primary); color: var(--pico-primary); }
    /* Party mode group chat */
    .chat { display: flex; flex-direction: column; gap: .6rem; max-height: 60vh; overflow-y: auto;
      padding: .5rem; background: var(--pico-card-background-color); border-radius: 8px; }
    .bubble { padding: .5rem .8rem; border-radius: 10px; background: var(--pico-background-color);
      border: 1px solid var(--pico-muted-border-color); }
    .bubble.facilitator { border-left: 3px solid var(--pico-primary); }
    .bubble.system { background: transparent; border-style: dashed; font-size: .85rem; color: var(--pico-muted-color); }
    .bubble .who { font-weight: 600; font-size: .8rem; }
    .bubble .who small { font-weight: 400; color: var(--pico-muted-color); }
    .bubble .msg { white-space: pre-wrap; margin-top: .15rem; }
    .party-turn { font-size: .85rem; color: var(--pico-muted-color); min-height: 1.2em; }
    .change-card { border-left: 3px solid var(--pico-muted-border-color); }
    .change-card.applied { border-left-color: #38a169; }
    .change-card.denied { opacity: .55; border-left-color: #e53e3e; }
  </style>
</head>
<body>
<main class="container">
  <hgroup>
    <h1>Incipit</h1>
    <p><em>here begins</em> — idea → structured mega-prompt, BMAD-style, in minutes.</p>
  </hgroup>
  <p>
    <a href="#" role="button" class="secondary outline" style="width:auto;padding:.2rem .7rem;font-size:.8rem"
       hx-get="/settings" hx-target="#settings-region" hx-swap="innerHTML">⚙ Model settings</a>
  </p>
  <div id="settings-region"></div>
  <div id="wizard">
    {% block content %}{% endblock %}
  </div>
</main>
<script>
  // Keep the party-mode chat scrolled to the newest message after SSE swaps.
  document.body.addEventListener('htmx:afterSwap', function (e) {
    if (e.target && e.target.id === 'party-chat') {
      e.target.scrollTop = e.target.scrollHeight;
    }
  });
</script>
</body>
</html>
