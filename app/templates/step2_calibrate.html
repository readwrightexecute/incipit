<p class="step-label">Step 2 of 5 — Calibration</p>
<form hx-post="/sessions/{{ s.id }}/calibrate" hx-target="#wizard" hx-swap="innerHTML">
  <fieldset>
    <legend><strong>How serious is this?</strong></legend>
    {% for value, label, hint in stakes %}
    <label>
      <input type="radio" name="stakes" value="{{ value }}" {% if loop.first %}checked{% endif %}>
      {{ label }} — <small>{{ hint }}</small>
    </label>
    {% endfor %}
  </fieldset>
  <fieldset>
    <legend><strong>Form factor</strong></legend>
    {% for ff in form_factors %}
    <label>
      <input type="radio" name="form_factor" value="{{ ff }}" {% if loop.first %}checked{% endif %}>
      {{ ff }}
    </label>
    {% endfor %}
  </fieldset>
  <button type="submit">Generate clarifying questions →</button>
</form>
